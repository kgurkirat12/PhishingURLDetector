services:
  - type: web
    name: phishing-url-detector
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: GOOGLE_SAFE_BROWSING_API_KEY
        sync: false
